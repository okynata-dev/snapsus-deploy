<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0a" />
<title>Page not found — Snapsus</title>
<meta name="robots" content="noindex" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Montserrat:wght@700&display=swap" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  :root {
    --ink: #0a0a0a; --ink-2: #6b6b6b; --ink-3: #9a9a9a; --bg: #fafaf7;
    --accent: #5b3bff;
    --font: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    --serif: "Montserrat", "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, monospace;
  }
  body {
    font-family: var(--font); color: var(--ink); background: var(--bg);
    -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
    min-height: 100vh; display: flex; flex-direction: column;
    overflow-x: hidden;
  }
  .backdrop { position: fixed; inset: 0; z-index: -1; pointer-events: none; }
  .backdrop::before {
    content: ""; position: absolute; inset: -10%;
    background:
      radial-gradient(70vmax 55vmax at 88% -8%, rgba(91,59,255,0.13), transparent 52%),
      radial-gradient(55vmax 50vmax at -8% 105%, rgba(255,170,110,0.09), transparent 55%);
  }
  main {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 48px 24px; text-align: center;
  }
  .code {
    font-family: var(--mono); font-size: 13px;
    color: var(--ink-3); letter-spacing: 0.15em;
    margin-bottom: 18px;
  }
  h1 {
    font-family: var(--serif);
    font-size: clamp(40px, 6vw, 72px);
    font-weight: 700; letter-spacing: -0.028em;
    line-height: 1.05; margin: 0 0 18px;
    max-width: 760px;
  }
  h1 em { font-style: normal; color: var(--accent); font-weight: 700; }
  p { color: var(--ink-2); font-size: 15.5px; max-width: 480px; line-height: 1.55; margin: 0 0 32px; }
  .home-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 13px 22px; background: var(--ink); color: white;
    border-radius: 10px; text-decoration: none;
    font-weight: 500; font-size: 14px;
    transition: transform .15s, background .15s;
    box-shadow: 0 8px 24px -8px rgba(91,59,255,0.30);
  }
  .home-btn:hover { transform: translateY(-1px); background: #1a1a1a; }
  .mark {
    width: 64px; height: 64px; border-radius: 16px;
    background: var(--ink);
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 28px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 12px 28px -10px rgba(91,59,255,0.30);
  }
  .mark svg { width: 32px; height: 32px; }
</style>
</head>
<body>

<div class="backdrop" aria-hidden="true"></div>

<main>
  <span class="mark" aria-hidden="true">
    <svg viewBox="0 0 64 64" fill="none">
      <g stroke="white" stroke-width="5" stroke-linecap="round">
        <path d="M14 23 L14 14 L23 14"/>
        <path d="M41 14 L50 14 L50 23"/>
        <path d="M50 41 L50 50 L41 50"/>
        <path d="M23 50 L14 50 L14 41"/>
      </g>
      <circle cx="32" cy="32" r="4" fill="white"/>
    </svg>
  </span>
  <p class="code">404 · NOT FOUND</p>
  <h1>Nothing to <em>snap</em> here.</h1>
  <p>The page you're looking for doesn't exist, or got moved. Head back to the homepage and start a fresh snapshot.</p>
  <a class="home-btn" href="/">
    Take me home
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>
</main>

</body>
</html>
