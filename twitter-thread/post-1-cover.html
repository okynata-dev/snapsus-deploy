<!doctype html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Montserrat:wght@700;800&display=swap">
<style>
  html, body { margin:0; padding:0; }
  body {
    width:1600px; height:900px;
    background:#fafaf7;
    font-family:"Inter",sans-serif;
    color:#0a0a0a;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    overflow:hidden; position:relative;
  }
  body::before {
    content:""; position:absolute; inset:-10%;
    background:
      radial-gradient(50vmax 40vmax at 85% 5%, rgba(91,59,255,0.12), transparent 55%),
      radial-gradient(45vmax 40vmax at 15% 95%, rgba(255,170,110,0.08), transparent 55%);
  }
  .mark {
    position:relative;
    width:96px; height:96px; border-radius:22px;
    background:#0a0a0a;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 18px 40px -16px rgba(91,59,255,0.32), inset 0 1px 0 rgba(255,255,255,0.15);
    margin-bottom:48px;
  }
  .mark svg { width:48px; height:48px; }
  h1 {
    position:relative;
    font-family:"Montserrat",sans-serif;
    font-weight:800; letter-spacing:-0.035em;
    font-size:200px; line-height:0.95;
    margin:0;
  }
  .sub {
    position:relative;
    font-size:30px; color:#6b6b6b;
    margin-top:32px; letter-spacing:-0.005em;
  }
  .url {
    position:absolute;
    bottom:64px; right:80px;
    font-family:ui-monospace,"SF Mono",Menlo,monospace;
    font-size:18px; color:#9a9a9a; letter-spacing:0.04em;
  }
</style></head><body>
  <div class="mark">
    <svg viewBox="0 0 64 64" fill="none">
      <g stroke="white" stroke-width="5" stroke-linecap="round">
        <path d="M14 23 L14 14 L23 14"/>
        <path d="M41 14 L50 14 L50 23"/>
        <path d="M50 41 L50 50 L41 50"/>
        <path d="M23 50 L14 50 L14 41"/>
      </g>
      <circle cx="32" cy="32" r="4" fill="white"/>
    </svg>
  </div>
  <h1>Snapsus.</h1>
  <div class="sub">Holder snapshots in 30 seconds.</div>
  <div class="url">snapsus.com</div>
</body></html>
