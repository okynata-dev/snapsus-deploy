<!doctype html>
<html><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Montserrat:wght@700;800&display=swap">
<style>
  html, body { margin:0; padding:0; }
  body {
    width:1600px; height:900px;
    background:#0a0a0a; color:white;
    font-family:"Montserrat",sans-serif;
    display:flex; flex-direction:column;
    align-items:flex-start; justify-content:center;
    padding-left:160px;
    overflow:hidden; position:relative;
  }
  body::before {
    content:""; position:absolute; inset:0;
    background:
      radial-gradient(70vmax 50vmax at 100% 0%, rgba(91,59,255,0.18), transparent 55%);
    pointer-events:none;
  }
  .line {
    position:relative;
    font-weight:800; letter-spacing:-0.035em;
    font-size:128px; line-height:1.1;
    margin:8px 0;
  }
  .line span.x { color:#5b3bff; }
  .footer {
    position:absolute;
    bottom:64px; left:160px;
    font-family:ui-monospace,"SF Mono",Menlo,monospace;
    font-size:18px; color:#6b6b6b; letter-spacing:0.06em;
  }
</style></head><body>
  <div class="line">No accounts.</div>
  <div class="line">No wallet connect.</div>
  <div class="line">No tracking.</div>
  <div class="footer">snapsus.com — built on Cloudflare's edge.</div>
</body></html>
